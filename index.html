<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Spots photo sharing Website" />
    <meta name="author" content="TT Spots Project" />
    <meta name="keywords" content="HTML, CSS, Flexbox" />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Spots</title>
  </head>

  <body>
    <div class="page">
      <header class="header">
        <img src="./images/logo.svg" alt="Spots logo" class="header__logo" />
      </header>

      <main class="content">
        <section class="profile">
          <img
            src="./images/avatar.jpg"
            alt="Profile avatar of Bessie Coleman"
            class="profile__avatar"
          />

          <div class="profile__column">
            <h1 class="profile__name">Bessie Coleman</h1>

            <p class="profile__description">Civil Aviator</p>

            <button type="button" class="profile__edit-btn">
              <img src="./images/pencil.svg" alt="" />
              Edit Profile
            </button>
          </div>

          <button type="button" class="profile__new-post-btn">
            <img src="./images/plus.svg" alt="" />
            New Post
          </button>
        </section>

        <section class="cards page__section">
          <ul class="cards__list"></ul>
        </section>

        <template id="card-template">
          <li class="card">
            <button class="card__delete-btn"></button>

            <img class="card__image" alt="" />

            <div class="card__content">
              <h2 class="card__title"></h2>

              <button class="card__like-btn"></button>
            </div>
          </li>
        </template>
      </main>

      <footer class="footer">
        <p class="footer__copyright">2026 © Spots</p>
      </footer>

      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-btn">X</button>

          <h2 class="modal__title">Edit profile</h2>

          <form class="modal__form" novalidate>
            <label class="modal__label">
              Name

              <input
                id="profile-name-input"
                type="text"
                class="modal__input"
                required
                minlength="2"
                maxlength="40"
              />

              <span class="modal__error" id="profile-name-input-error"></span>
            </label>

            <label class="modal__label">
              Description

              <input
                id="profile-description-input"
                type="text"
                class="modal__input"
                required
                minlength="2"
                maxlength="200"
              />

              <span
                class="modal__error"
                id="profile-description-input-error"
              ></span>
            </label>

            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-btn">X</button>

          <h2 class="modal__title">New post</h2>

          <form class="modal__form" novalidate>
            <label class="modal__label">
              Image link

              <input
                id="card-image-input"
                type="url"
                class="modal__input"
                required
              />

              <span class="modal__error" id="card-image-input-error"></span>
            </label>

            <label class="modal__label">
              Caption

              <input
                id="post-caption-input"
                type="text"
                class="modal__input"
                required
                minlength="2"
                maxlength="30"
              />

              <span class="modal__error" id="post-caption-input-error"></span>
            </label>

            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="image-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-btn">X</button>

          <img class="modal__image" alt="Preview image" />

          <p class="modal__caption"></p>
        </div>
      </div>

      <script src="./scripts/validation.js"></script>
      <script src="./scripts/index.js"></script>
    </div>
  </body>
</html>
